spring.application.name=Nutryon

# Datasource — credenciais via variáveis de ambiente (sem fallback para evitar uso acidental do Oracle FIAP)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# HikariCP — limites conservadores para Oracle Cloud Autonomous Database (Always Free)
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL_SIZE:5}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:2}
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.keepalive-time=120000
spring.datasource.hikari.connection-test-query=SELECT 1 FROM DUAL

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:none}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect

# Flyway Settings
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}
spring.flyway.baseline-on-migrate=${SPRING_FLYWAY_BASELINE_ON_MIGRATE:true}
spring.flyway.check-location=true
spring.flyway.locations=classpath:/db/migration
spring.flyway.ignore-migration-patterns=*:missing,*:ignored
spring.flyway.validate-on-migrate=${SPRING_FLYWAY_VALIDATE_ON_MIGRATE:false}

# JWT Security — obrigatório definir JWT_SECRET no ambiente (sem fallback fraco)
jwt.secret=${JWT_SECRET}

# CORS — origens permitidas separadas por vírgula
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

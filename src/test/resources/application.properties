# Configuração exclusiva para testes — sobrescreve o application.properties principal
# Usa H2 em memória: não precisa do Oracle Cloud nem de env vars

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=value
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.flyway.enabled=false

# JWT — valor fixo só para testes (não usado em produção)
jwt.secret=test-jwt-secret-somente-para-testes-nao-usar-em-producao-64chars

cors.allowed-origins=http://localhost:4200
